version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bloom-postgres
    environment:
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom_dev_password
      POSTGRES_DB: bloom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloom"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bloom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: bloom-web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://bloom:bloom_dev_password@postgres:5432/bloom
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  workers:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: bloom-workers
    environment:
      - DATABASE_URL=postgresql://bloom:bloom_dev_password@postgres:5432/bloom
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
